<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>⚡ DANZZOFC TERMINAL - HACKER SIMULATOR</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Courier New', monospace;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            background: #0a0a0a;
            color: #0f0;
            min-height: 100vh;
            padding: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .container {
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
        }
        
        .card {
            background: #111;
            border: 2px solid #0f0;
            border-radius: 20px;
            padding: 20px 15px;
            box-shadow: 0 0 30px rgba(0, 255, 0, 0.3);
        }
        
        .header {
            text-align: center;
            margin-bottom: 20px;
        }
        
        .title {
            font-size: 2em;
            font-weight: bold;
            color: #0f0;
            text-shadow: 0 0 15px #0f0;
            letter-spacing: 3px;
        }
        
        .subtitle {
            color: #0f0;
            font-size: 0.8em;
            opacity: 0.8;
            margin-top: 5px;
        }
        
        .status-bar {
            display: flex;
            justify-content: space-between;
            background: #1a1a1a;
            border: 1px solid #0f0;
            border-radius: 30px;
            padding: 12px 15px;
            margin-bottom: 20px;
            font-size: 0.8em;
        }
        
        .status-item {
            display: flex;
            align-items: center;
            gap: 5px;
        }
        
        .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #0f0;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%,100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .terminal {
            background: #000;
            border: 2px solid #0f0;
            border-radius: 15px;
            margin-bottom: 20px;
            overflow: hidden;
        }
        
        .terminal-bar {
            background: #1a1a1a;
            padding: 10px 15px;
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid #0f0;
        }
        
        .terminal-title {
            color: #0f0;
            font-size: 0.9em;
            font-weight: bold;
        }
        
        .terminal-buttons {
            display: flex;
            gap: 8px;
        }
        
        .term-btn {
            width: 15px;
            height: 15px;
            border-radius: 50%;
        }
        
        .term-red { background: #ff4444; }
        .term-yellow { background: #ffbb33; }
        .term-green { background: #00C851; }
        
        .terminal-screen {
            padding: 15px;
            min-height: 250px;
            max-height: 350px;
            overflow-y: auto;
            font-size: 0.9em;
            line-height: 1.6;
        }
        
        .line {
            margin: 5px 0;
            word-break: break-word;
        }
        
        .prompt {
            color: #0f0;
            font-weight: bold;
        }
        
        .cmd {
            color: #ff0;
        }
        
        .output {
            color: #0f0;
            margin-left: 20px;
        }
        
        .tools-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }
        
        .tool-btn {
            background: #1a1a1a;
            border: 2px solid #0f0;
            border-radius: 15px;
            padding: 15px 5px;
            text-align: center;
            color: #0f0;
            font-size: 0.9em;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }
        
        .tool-btn:active {
            background: #0f0;
            color: #000;
            transform: scale(0.95);
        }
        
        .info-panel {
            background: #1a1a1a;
            border: 2px solid #0f0;
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 15px;
        }
        
        .info-title {
            color: #0f0;
            font-weight: bold;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .info-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-bottom: 15px;
        }
        
        .info-box {
            text-align: center;
        }
        
        .info-label {
            color: #0f0;
            font-size: 0.7em;
            opacity: 0.8;
        }
        
        .info-value {
            color: #ff0;
            font-size: 1.2em;
            font-weight: bold;
        }
        
        .progress-bg {
            width: 100%;
            height: 10px;
            background: #000;
            border: 1px solid #0f0;
            border-radius: 10px;
            overflow: hidden;
        }
        
        .progress-fill {
            height: 100%;
            background: #0f0;
            width: 0%;
            transition: width 0.3s;
        }
        
        .log-box {
            background: #000;
            border: 1px solid #0f0;
            border-radius: 10px;
            padding: 10px;
            font-size: 0.75em;
            min-height: 80px;
            max-height: 100px;
            overflow-y: auto;
        }
        
        .footer {
            text-align: center;
            font-size: 0.7em;
            color: #0f0;
            opacity: 0.6;
        }
        
        .spinner {
            display: inline-block;
            width: 12px;
            height: 12px;
            border: 2px solid #0f0;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        @media (max-width: 380px) {
            .tools-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <!-- HEADER -->
            <div class="header">
                <div class="title">⚡ DANZZOFC ⚡</div>
                <div class="subtitle">INTERACTIVE HACKER SIMULATOR</div>
            </div>
            
            <!-- STATUS BAR -->
            <div class="status-bar">
                <div class="status-item"><span class="dot"></span> LIVE</div>
                <div class="status-item">🔒 AMAN</div>
                <div class="status-item">📱 MOBILE</div>
            </div>
            
            <!-- TERMINAL (INI YANG AKAN BERUBAH) -->
            <div class="terminal">
                <div class="terminal-bar">
                    <span class="terminal-title">danzzofc@hacker:~$</span>
                    <div class="terminal-buttons">
                        <div class="term-btn term-red"></div>
                        <div class="term-btn term-yellow"></div>
                        <div class="term-btn term-green"></div>
                    </div>
                </div>
                <div class="terminal-screen" id="terminal">
                    <div class="line">
                        <span class="prompt">danzzofc@hacker:~$</span> 
                        <span class="cmd">./welcome</span>
                    </div>
                    <div class="line">
                        <span class="output">▶ Selamat datang danzzofc!</span>
                    </div>
                    <div class="line">
                        <span class="output">▶ Klik tombol di bawah buat simulasi</span>
                    </div>
                </div>
            </div>
            
            <!-- TOOLS (SEMUA UDAH BISA DIPENCET) -->
            <div class="tools-grid">
                <button class="tool-btn" onclick="runDDOS()">
                    <span>💀</span>
                    <span>DDOS</span>
                </button>
                <button class="tool-btn" onclick="runSQL()">
                    <span>💉</span>
                    <span>SQL INJECT</span>
                </button>
                <button class="tool-btn" onclick="runScan()">
                    <span>🔍</span>
                    <span>PORT SCAN</span>
                </button>
                <button class="tool-btn" onclick="runCrack()">
                    <span>🔓</span>
                    <span>CRACK</span>
                </button>
                <button class="tool-btn" onclick="runSpoof()">
                    <span>🎭</span>
                    <span>SPOOF IP</span>
                </button>
                <button class="tool-btn" onclick="clearTerminal()">
                    <span>🧹</span>
                    <span>CLEAR</span>
                </button>
            </div>
            
            <!-- INFO PANEL (ANGKA BERUBAH) -->
            <div class="info-panel">
                <div class="info-title">
                    <span>📊 STATUS</span>
                    <span class="spinner"></span>
                </div>
                <div class="info-grid">
                    <div class="info-box">
                        <div class="info-label">ANONYMITY</div>
                        <div class="info-value" id="anonymity">96%</div>
                    </div>
                    <div class="info-box">
                        <div class="info-label">IP</div>
                        <div class="info-value" id="ip">HIDDEN</div>
                    </div>
                </div>
                <div class="progress-bg">
                    <div class="progress-fill" id="progress" style="width: 96%;"></div>
                </div>
            </div>
            
            <!-- LIVE LOG -->
            <div class="info-panel">
                <div class="info-title">📜 LIVE LOG</div>
                <div class="log-box" id="log">
                    [12:34:56] System ready<br>
                </div>
            </div>
            
            <!-- FOOTER -->
            <div class="footer">
                ⚡ KLIK TOMBOL DI ATAS - LANGSUNG MUNCUL RESPON ⚡
            </div>
        </div>
    </div>
    
    <script>
        // ==================== AMBIL ELEMENT ====================
        const terminal = document.getElementById('terminal');
        const anonymityEl = document.getElementById('anonymity');
        const ipEl = document.getElementById('ip');
        const progressEl = document.getElementById('progress');
        const logEl = document.getElementById('log');
        
        // ==================== VARIABEL ====================
        let anonymity = 96;
        let logs = ['[12:34:56] System ready'];
        
        // ==================== FUNGSI TERMINAL ====================
        function addLine(command, output = null) {
            // Baris command
            const cmdLine = document.createElement('div');
            cmdLine.className = 'line';
            cmdLine.innerHTML = `<span class="prompt">danzzofc@hacker:~$</span> <span class="cmd">${command}</span>`;
            terminal.appendChild(cmdLine);
            
            // Baris output (kalo ada)
            if(output) {
                const outLine = document.createElement('div');
                outLine.className = 'line';
                
                if(Array.isArray(output)) {
                    // Kalo output banyak
                    output.forEach(o => {
                        const oLine = document.createElement('div');
                        oLine.className = 'line';
                        oLine.innerHTML = `<span class="output">▶ ${o}</span>`;
                        terminal.appendChild(oLine);
                    });
                } else {
                    outLine.innerHTML = `<span class="output">▶ ${output}</span>`;
                    terminal.appendChild(outLine);
                }
            }
            
            // Spacer
            terminal.appendChild(document.createElement('br'));
            
            // Scroll ke bawah
            terminal.scrollTop = terminal.scrollHeight;
            
            // Batasi jumlah line (biar ngga kepanjangan)
            while(terminal.children.length > 20) {
                terminal.removeChild(terminal.children[0]);
            }
        }
        
        // ==================== FUNGSI LOG ====================
        function addLog(message) {
            const now = new Date();
            const time = `${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}:${now.getSeconds().toString().padStart(2,'0')}`;
            
            logs.push(`[${time}] ${message}`);
            if(logs.length > 5) logs.shift();
            
            logEl.innerHTML = logs.join('<br>') + '<br>';
        }
        
        // ==================== FUNGSI UPDATE STATUS ====================
        function updateAnonymity(change) {
            anonymity = Math.min(99, Math.max(80, anonymity + change));
            anonymityEl.textContent = anonymity + '%';
            progressEl.style.width = anonymity + '%';
        }
        
        function randomIP() {
            const ips = ['HIDDEN', '10.0.0.1', '192.168.1.1', 'TOR', 'VPN', 'ANON'];
            ipEl.textContent = ips[Math.floor(Math.random() * ips.length)];
        }
        
        // ==================== FUNGSI TOMBOL (SEMUA BISA DIPENCET) ====================
        function runDDOS() {
            addLine('./ddos --target 192.168.1.1 --power 100%');
            setTimeout(() => {
                addLine('', '💀 Memulai serangan DDOS...');
                addLog('DDOS attack dimulai');
            }, 300);
            setTimeout(() => {
                addLine('', [
                    '✅ Serangan selesai!',
                    '📊 Paket terkirim: 1,234,567',
                    '🎯 Target: 192.168.1.1 (DOWN)'
                ]);
                updateAnonymity(-2);
                addLog('DDOS selesai - target down');
            }, 2000);
        }
        
        function runSQL() {
            addLine('sqlmap -u "http://test.com/page.php?id=1" --dbs');
            setTimeout(() => {
                addLine('', '💉 Menjalankan SQL injection...');
                addLog('SQL injection started');
            }, 300);
            setTimeout(() => {
                addLine('', [
                    '✅ Database ditemukan:',
                    '📁 users (52 entries)',
                    '📁 admin (1 entry)',
                    '📁 products (128 entries)'
                ]);
                addLog('SQL injection berhasil');
            }, 1800);
        }
        
        function runScan() {
            addLine('nmap -sV -p 1-1000 target.com');
            setTimeout(() => {
                addLine('', '🔍 Scanning ports...');
                addLog('Port scan dimulai');
            }, 300);
            setTimeout(() => {
                addLine('', [
                    '✅ Hasil scan:',
                    '📌 Port 22: SSH - Open',
                    '📌 Port 80: HTTP - Open', 
                    '📌 Port 443: HTTPS - Open',
                    '📌 Port 3306: MySQL - Filtered'
                ]);
                addLog('Port scan selesai');
            }, 2000);
        }
        
        function runCrack() {
            addLine('john --wordlist=rockyou.txt hash.txt');
            setTimeout(() => {
                addLine('', '🔓 Mencrack password...');
                addLog('Cracking dimulai');
            }, 300);
            setTimeout(() => {
                addLine('', [
                    '✅ Password ditemukan:',
                    '🔐 admin:admin123',
                    '🔐 user:password',
                    '🔐 root:toor'
                ]);
                updateAnonymity(-1);
                addLog('2 password berhasil di-crack');
            }, 2500);
        }
        
        function runSpoof() {
            addLine('python3 spoof.py --interface eth0 --ip 8.8.8.8');
            setTimeout(() => {
                addLine('', '🎭 Mengganti IP address...');
                addLog('IP spoofing started');
            }, 300);
            setTimeout(() => {
                randomIP();
                addLine('', [
                    '✅ IP berhasil di-spoof!',
                    '📍 IP baru: 8.8.8.8',
                    '🌍 Lokasi: USA (Google DNS)'
                ]);
                addLog('IP spoofed ke 8.8.8.8');
            }, 1500);
        }
        
        function clearTerminal() {
            terminal.innerHTML = `
                <div class="line">
                    <span class="prompt">danzzofc@hacker:~$</span> 
                    <span class="cmd">clear</span>
                </div>
                <div class="line">
                    <span class="output">▶ Terminal dibersihkan</span>
                </div>
                <div class="line">
                    <span class="output">▶ Klik tombol untuk memulai</span>
                </div>
            `;
            addLog('Terminal dibersihkan');
        }
        
        // ==================== AUTO UPDATE ====================
        setInterval(randomIP, 30000);
        
        setInterval(() => {
            // Update anonymity random
            let change = Math.floor(Math.random() * 3) - 1; // -1,0,1
            updateAnonymity(change);
        }, 8000);
        
        // ==================== PROTEKSI HP ====================
        document.addEventListener('contextmenu', e => e.preventDefault());
        
        // Cegah zoom
        document.addEventListener('touchstart', (e) => {
            if(e.touches.length > 1) e.preventDefault();
        }, { passive: false });
        
        // Log awal
        addLog('Simulator siap digunakan');
    </script>
</body>
</html>
